---
magic_castle::site::all:
  - profile::base
  - profile::consul
  - profile::freeipa
  - profile::users::local
  - profile::sssd::client
  - profile::prometheus::node_exporter
  - profile::rsyslog::client
  - profile::volumes
  - profile::vector
  - profile::mail


profile::vector::access_var_log: true
profile::vector::config: |
  sources:
    puppet_agent_logs:
      type: journald
      data_dir: /var/lib/vector
      include_units: ["puppet.service"]
      since_now: False
      exclude_matches:
        PRIORITY: ["6", "7"]
    cloud_init:
      type: file
      include:
        - /var/log/cloud-init.log

  transforms:
    from_cloud_init:
      type: remap
      inputs: [cloud_init]
      source: |-
        .list = split!(.message, " - ")
        .timestamp = parse_timestamp!(.list[0], format: "%F %H:%M:%S,%3f")
        .message = .list[1]
        .program = "cloud-init"

    # Some timestamp are discarted because the date are before the NTP client is configured
    cloud_init_valid:
      type: route
      inputs:
        - from_cloud_init
      route:
        valid:
          type: "vrl"
          source: |-
           to_unix_timestamp!(.timestamp) > to_unix_timestamp(now()) - 3600*2

    discarted_timestamp_range:
      expire_after_ms: 1000
      type: reduce
      inputs:
        - cloud_init_valid._unmatched
    discarted_timestamp_remap:
      type: remap
      inputs: [discarted_timestamp_range]
      source: |-
        .message = to_unix_timestamp!(.timestamp_end) - to_unix_timestamp!(.timestamp)
        .timestamp = now()
        .program = "cloud-init-ntp-correction"

    from_journald:
      type: remap
      inputs: [puppet_agent_logs]
      source: |-
        .program = .SYSLOG_IDENTIFIER

    to_elastic_format:
      type: remap
      inputs: [from_journald, cloud_init_valid.valid, discarted_timestamp_remap]
      source: |-
        .elastic.message = .message
        .elastic."@timestamp" = .timestamp
        .elastic.run_id = "${RUN_ID}"
        .elastic.workspace = "${TF_WORKSPACE}"
        .elastic.program = .program
        .elastic.host = parse_regex!(get_hostname!(), r'^([^.]*)\.', numeric_groups: true)."1"
        . = .elastic

  sinks:
    output_elasticsearch:
      type: elasticsearch
      inputs:
        - to_elastic_format
      endpoints:
        - "$OPENSEARCH_URL"
      api_version: "v8"
      auth:
        strategy: basic
        user: "$OPENSEARCH_USERNAME"
        password: "$OPENSEARCH_PASSWORD"
      bulk:
        action: "create"
        index: "${OPENSEARCH_INDEX}"
      request:
        headers:
          CF-Access-Client-Id: "$OPENSEARCH_CF_CLIENT"
          CF-Access-Client-Secret: "$OPENSEARCH_CF_SECRET"
    output_console:
      type: console
      inputs: [to_elastic_format]
      encoding:
        codec: "json"

