name: Terraform Apply

on: push
# schedule:
#   # Set the cron timing as per your requirement
#   - cron: '0 0 * * *' # This will trigger the action at midnight UTC every day

env:
  TF_CLOUD_ORGANIZATION: "${{ vars.TF_CLOUD_ORGANIZATION }}"
  TF_API_TOKEN: "${{ secrets.TERRAFORM_CLOUD_TOKEN }}"
  TF_WORKSPACE: "${{ vars.TF_WORKSPACE }}"
  CONFIG_DIRECTORY: "./demo-infra"
  OPENSEARCH_PASSWORD: "${{ secrets.OPENSEARCH_PASSWORD }}"
  OPENSEARCH_USERNAME: "${{ vars.OPENSEARCH_USERNAME }}"
  OPENSEARCH_URL: "${{ vars.OPENSEARCH_URL }}"
  OPENSEARCH_INDEX: "${{ vars.OPENSEARCH_INDEX }}"
  RUN_ID: "test_id"

jobs:
  terraform:
    name: "Terraform Apply"
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Publish log
        run: ./scripts/push_elasticsearch.sh
