name: Terraform Destroy Cron Daily

on:
  schedule:
    - cron: '0 2 * * *' # Must match with apply +1h
    - cron: '0 14 * * *' # Must match with apply +1h
  push:
    tags:
      - daily_destroy

jobs:
  destroy:
    uses: ./.github/workflows/terraform-destroy.yaml
    with:
      subfolder: "daily"
    secrets: inherit
