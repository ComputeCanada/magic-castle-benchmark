name: "Terraform Plan"

on:
  push:
    branches:
      - demo

env:
  TF_CLOUD_ORGANIZATION: "${{ vars.TF_CLOUD_ORGANIZATION }}"
  TF_API_TOKEN: "${{ secrets.TERRAFORM_CLOUD_TOKEN }}"
  TF_WORKSPACE: "${{ vars.TF_WORKSPACE }}"
  CONFIG_DIRECTORY: "./demo-infra"
  OPENSEARCH_PASSWORD: "${{ secrets.OPENSEARCH_PASSWORD }}"
  OPENSEARCH_USERNAME: "${{ vars.OPENSEARCH_USERNAME }}"
  OPENSEARCH_URL: "${{ vars.OPENSEARCH_URL }}"
  OPENSEARCH_INDEX: "${{ vars.OPENSEARCH_INDEX }}"
  RUN_ID: "RUN_ID_${{ github.run_id }}"

jobs:
  terraform:
    if: github.repository != 'hashicorp-education/learn-terraform-github-actions'
    name: "Terraform Plan"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: envsubst
        uses: danielr1996/envsubst-action@1.0.0
        with:
          input: "${{ env.CONFIG_DIRECTORY }}/hieradata.template.yaml"
          output: "${{ env.CONFIG_DIRECTORY }}/hieradata.yaml"
      - name: Upload Configuration
        uses: hashicorp/tfc-workflows-github/actions/upload-configuration@v1.0.0
        id: plan-upload
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          directory: ${{ env.CONFIG_DIRECTORY }}
          speculative: true

      - name: Create Plan Run
        uses: hashicorp/tfc-workflows-github/actions/create-run@v1.0.0
        id: plan-run
        with:
          workspace: ${{ env.TF_WORKSPACE }}
          configuration_version: ${{ steps.plan-upload.outputs.configuration_version_id }}
          plan_only: true

      - name: Get Plan Output
        uses: hashicorp/tfc-workflows-github/actions/plan-output@v1.0.0
        id: plan-output
        with:
          plan: ${{ fromJSON(steps.plan-run.outputs.payload).data.relationships.plan.data.id }}
